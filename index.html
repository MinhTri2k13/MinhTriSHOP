<!DOCTYPE html>
<html lang="vi">
<head>

  <title>Shop của Trí</title>

</head>
<body>

<h1>🛒 Shop Minh Trí</h1>

<div class="products">

    <h2>Áo đẹp trai</h2>

</div>

<h2>🧺 Giỏ hàng</h2>
<ul id="cart"></ul>

<script src="script.js"></script>
</body>
</html>
